<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conversor de Petições PJe</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

    <!-- Chamada para os novos arquivos separados -->
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>Conversor de Petições PJe</h1>
        <p>Extraia texto e imagens de processos judiciais para formato TXT otimizado para análise por Inteligência Artificial. Processamento 100% local.</p>
    </div>

    <div class="drop-zone" id="drop-zone">
        <svg class="icon-svg" viewBox="0 0 24 24">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
            <polyline points="17 8 12 3 7 8"></polyline>
            <line x1="12" y1="3" x2="12" y2="15"></line>
        </svg>
        <div class="drop-zone-text">Clique para selecionar ou arraste o PDF do processo aqui</div>
        <input type="file" id="file-input" class="file-input" accept="application/pdf">
    </div>

    <div class="config-panel">
        <div class="config-title">Inteligência de Limpeza e Performance</div>
        
        <div class="config-group" style="margin-bottom: 24px; padding-bottom: 16px; border-bottom: 1px dashed var(--border-color);">
            <label class="checkbox-label" style="color: var(--primary-color); font-weight: 600;">
                <input type="checkbox" id="fast-mode" checked>
                ⚡ Ativar Modo Turbo (Extração super-rápida, arquivo ZIP levemente maior)
            </label>
        </div>
        
        <div class="config-group">
            <label class="checkbox-label">
                <input type="checkbox" id="remove-signatures" checked>
                Excluir automaticamente assinaturas eletrônicas padrão do PJe
            </label>
        </div>
        
        <div class="config-group">
            <label for="custom-footers" class="textarea-label">
                Excluir rodapés e termos repetitivos (separe múltiplos blocos usando <code>---</code>):
            </label>
            <textarea id="custom-footers" class="custom-textarea" placeholder="Exemplo:&#10;Este documento é cópia do original...&#10;---&#10;Firmado por assinatura eletrônica..."></textarea>
        </div>
    </div>

    <div id="status-area"></div>
    <div class="progress-bar-container" id="progress-container">
        <div class="progress-bar" id="progress-bar"></div>
    </div>
</div>

</body>
</html>
