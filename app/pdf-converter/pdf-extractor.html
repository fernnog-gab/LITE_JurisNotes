<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conversor de Petições PJe</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf_viewer.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

    <link rel="stylesheet" href="pdf-extractor.css">
    <script src="pdf-extractor.js" defer></script>
</head>
<body>

<div class="container" style="max-width: 95vw; width: 100%; padding: 20px;">
    
    <!-- Botão Voltar ao Portal -->
    <div style="width: 100%; display: flex; justify-content: flex-start; margin-bottom: 15px;">
        <a href="../../index.html" class="btn-home-module" title="Voltar ao Portal">
            <!-- Ícone de Casa -->
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                <polyline points="9 22 9 12 15 12 15 22"></polyline>
            </svg>
        </a>
    </div>

    <!-- Tela Inicial (Dropzone atualizada para processamento em lote) -->
    <div class="drop-zone" id="drop-zone" style="margin-top: 5vh; border-width: 3px;">
        <svg class="icon-svg" viewBox="0 0 24 24" style="width: 64px; height: 64px;">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
            <polyline points="17 8 12 3 7 8"></polyline>
            <line x1="12" y1="3" x2="12" y2="15"></line>
        </svg>
        <div class="drop-zone-text" style="font-size: 18px;">Arraste um ou mais PDFs do Processo aqui ou clique</div>
        <input type="file" id="file-input" class="file-input" accept="application/pdf" multiple>
    </div>

    <!-- Workspace Minimalista -->
    <div id="curation-workspace" style="display: none;">
        
        <div class="workspace-header" style="display: flex; justify-content: space-between; margin-bottom: 12px; align-items: center; background: #f9fafb; padding: 8px 12px; border-radius: var(--radius); border: 1px solid var(--border-color);">
            
            <div class="pdf-controls" style="display: flex; align-items: center; gap: 8px; flex-wrap: wrap;">
                <button id="btn-home" class="btn-secondary" style="padding: 6px 10px; font-size: 12px; font-weight: bold; display: flex; align-items: center; gap: 4px;">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg> Home
                </button>
                
                <!-- Menu de seleção rápida para alternar entre arquivos carregados -->
                <select id="active-file-select" class="custom-select" style="width: 200px; padding: 4px 8px; font-size: 12px; height: 30px; display: none;">
                </select>

                <button id="btn-prev" class="btn-secondary" style="padding: 6px 10px; font-size: 12px;">◀ Ant</button>
                
                <div style="display: flex; align-items: center; gap: 4px; font-size: 13px; font-weight: 500; margin: 0 10px;">
                    Pág <input type="number" id="page-input" min="1" value="1" style="width: 45px; text-align: center; padding: 4px; border: 1px solid var(--border-color); border-radius: 4px;"> 
                    de <span id="page-total">0</span>
                </div>
                
                <button id="btn-next" class="btn-secondary" style="padding: 6px 10px; font-size: 12px;">Próx ▶</button>
            </div>

            <div class="zoom-controls" style="display: flex; gap: 6px;">
                <button id="btn-zoom-out" class="btn-secondary" style="padding: 4px 10px;">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line><line x1="8" y1="11" x2="14" y2="11"></line></svg>
                </button>
                <span id="zoom-indicator" style="font-size: 12px; font-weight: 600; width: 40px; text-align: center; line-height: 28px;">100%</span>
                <button id="btn-zoom-in" class="btn-secondary" style="padding: 4px 10px;">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line><line x1="11" y1="8" x2="11" y2="14"></line><line x1="8" y1="11" x2="14" y2="11"></line></svg>
                </button>
            </div>
        </div>

        <div class="workspace-grid" style="display: flex; gap: 15px; height: 80vh; min-height: 600px;">
            <!-- Visualizador PDF -->
            <div id="pdf-viewer-wrapper" style="position: relative; border: 1px solid var(--border-color); border-radius: var(--radius); flex: 7; overflow: auto; background: #9ca3af; display: flex; justify-content: center; align-items: flex-start; padding: 20px;">
                <div id="pdf-page-container" style="position: relative; background: white; box-shadow: 0 4px 15px rgba(0,0,0,0.2);">
                    <canvas id="pdf-canvas" style="display: block;"></canvas>
                    <div id="text-layer" class="textLayer"></div>
                </div>
            </div>

            <!-- Painel Lateral -->
            <div id="snippets-panel" style="flex: 3; background: var(--bg-color); padding: 15px; border-radius: var(--radius); border: 1px solid var(--border-color); display: flex; flex-direction: column;">
                
                <button id="btn-extract-full" class="btn-secondary" style="width: 100%; margin-bottom: 15px; border-style: dashed; display: flex; justify-content: center; align-items: center; gap: 8px;">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line></svg>
                    Extrair Textos em Lote
                </button>

                <div id="marker-status-panel" style="background: #f8fafc; border: 1px dashed var(--text-muted); border-radius: 6px; padding: 10px; margin-bottom: 15px; text-align: center;">
                    <p style="margin: 0; font-size: 12px; font-weight: 600; color: var(--text-main); display: flex; align-items: center; justify-content: center; gap: 6px;">
                        <span id="marker-icon"></span><span id="marker-instruction">🟢 Aguardando: Selecione o texto de Início.</span>
                    </p>
                    <button id="btn-cancel-marker" class="btn-secondary" style="display: none; width: 100%; margin-top: 8px; padding: 4px; font-size: 11px; color: #dc2626; border-color: #dc2626;">Cancelar</button>
                </div>
                
                <div id="snippets-list" style="flex-grow: 1; overflow-y: auto; margin-bottom: 15px; display: flex; flex-direction: column; gap: 12px; padding-right: 5px;">
                    <p id="empty-state" style="font-size: 13px; color: var(--text-muted); text-align: center; margin-top: 50px;">Nenhum trecho em foco.</p>
                </div>
                <button id="btn-export-txt" class="btn-primary" style="width: 100%;" disabled>Baixar Recortes</button>
            </div>
        </div>
    </div>
    
    <!-- Tooltip Dinâmico (Preservado) -->
    <button id="selection-tooltip" class="btn-primary" style="display: none; position: absolute; z-index: 1000; padding: 8px 16px; font-size: 13px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); border-radius: 20px; cursor: pointer; align-items: center; gap: 6px;">
        <span id="tooltip-icon"></span><span id="tooltip-text">Definir Início</span>
    </button>
</div>

<!-- Modal de Nomenclatura com área dinâmica para Lote/Individual -->
<div id="naming-modal" class="modal-overlay" style="display: none;">
    <div class="modal-content" style="max-width: 900px; width: 95%; max-height: 90vh; display: flex; flex-direction: column;">
        <h3 style="margin-top: 0; color: var(--primary-color);">Identificação e Classificação Jurídica</h3>
        <p style="font-size: 12px; color: var(--text-muted); margin-bottom: 15px; margin-top: 4px;">Selecione o tipo de documento e informe a autoria correspondente para organização do lote.</p>
        
        <div id="modal-files-container" style="overflow-y: auto; flex-grow: 1; margin-bottom: 15px; padding-right: 5px;">
            <!-- As linhas de inputs dos arquivos serão inseridas dinamicamente aqui -->
        </div>

        <div style="display: flex; gap: 10px; justify-content: flex-end; padding-top: 15px; border-top: 1px solid var(--border-color);">
            <button id="btn-cancel-modal" class="btn-secondary">Cancelar</button>
            <button id="btn-confirm-modal" class="btn-primary">Confirmar e Seguir</button>
        </div>
    </div>
</div>

</body>
</html>
